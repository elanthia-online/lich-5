require:
  - ./.rubocop/cops/ascii_only_source.rb

AllCops:
  SuggestExtensions: false
  TargetRubyVersion: 4.0
  NewCops: disable
  Include:
    - '**/*.lic'
    - '**/*.rb'

Layout/ClosingHeredocIndentation:
  Enabled: false

Layout/EmptyLineAfterGuardClause:
  Enabled: false

Layout/EndOfLine:
  Enabled: false

Layout/FirstHashElementIndentation:
  EnforcedStyle: consistent

Layout/HashAlignment:
  EnforcedHashRocketStyle: table

Layout/HeredocIndentation:
  Enabled: false

Layout/LineLength:
  Enabled: false

Lint/MissingSuper:
  AllowedParentClasses: [Object, BaseObject, GameBase::Game]

Metrics/AbcSize:
  Enabled: false

Metrics/BlockLength:
  Enabled: false

Metrics/BlockNesting:
  Enabled: false

Metrics/ClassLength:
  Enabled: false

Metrics/CyclomaticComplexity:
  Enabled: false

Metrics/MethodLength:
  Enabled: false

Metrics/ModuleLength:
  Enabled: false

Metrics/PerceivedComplexity:
  Enabled: false
  
Metrics/ParameterLists:
  Enabled: false

Naming:
  Enabled: false

Naming/AsciiIdentifiers:
  Enabled: true

Security/Eval:
  Enabled: false
  
Security/MarshalLoad:
  Enabled: false

Style:
  Enabled: false

Style/AsciiComments:
  Enabled: true

Custom/AsciiOnlySource:
  Enabled: true
  Exclude:
    - 'lib/common/cli/cli_encryption_mode_change.rb'
    - 'lib/common/gui/account_manager_ui.rb'
    - 'lib/common/gui/manual_login_tab.rb'
    - 'lib/common/gui/master_password_prompt_ui.rb'
    - 'lib/common/gui/saved_login_tab.rb'
    - 'lib/games.rb'
    - 'spec/lib/common/authentication/entry_store_spec.rb'
    - 'spec/lib/common/gui/master_password_prompt_spec.rb'
    - 'spec/lib/common/gui/password_cipher_spec.rb'
    - 'spec/lib/common/gui/windows_credential_manager_spec.rb'
